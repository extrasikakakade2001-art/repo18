name: Calculator Test and Deploy

on:
  push:
      branches:
              -main

jobs:
  Test:
    runs-on: ubuntu-latest
    uses: actions/checkout@v2

    -name: set up python
    uses: actions/setup-python@v4
    with:
       python-version: '3.10'

    -name: install dependencies
    run: pip install -r requirements.txt

    -name: Run test and enforce covergae
    run: |
      pytest --cov=calc --cov-report=term --cov-report=html --cov-fail-under=80

    -name: Upload HTML coverage-report
    uses: actions/artifact@v4
    with:
      name: html-coverage-report
      path: htmlcov/

      Deploy: 
      runs-on: ubuntu-latest
      needs: test
      steps:
        -name: Print deployment message
        run: echo "proceding with deployment"
